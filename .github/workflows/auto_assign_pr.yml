name: PR assignment

on:
    pull_request:
        types: [opened, edited, synchronize, reopened]

jobs:
    auto-assign:
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
            issues: write
        steps:
            - name: 'Auto-assign PR'
              uses: pozil/auto-assign-issue@af6beea6bdf1e8eb373f061c5bc168681fc6d011
              with:
                  repo-token: ${{ secrets.GITHUB_TOKEN  }}
                  assignees: jeyrb
                  numOfAssignee: 1
                  allowSelfAssign: true
